name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release tag
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error('Release tag ' + actual + ' does not match package version ' + expected); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish package
        run: npm publish --access public
